#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  cmd = "templ generate && go build -gcflags='all=-N -l' -o ./tmp/app ./server"
  full_bin = "dlv exec --headless --listen=0.0.0.0:40000 --api-version=2 --accept-multiclient --continue ./tmp/app"
  delay = 1000
  entrypoint = ["tmp//app"]
  include_ext = ["go", "templ", "html", "css", "js"]
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_file = []
  exclude_regex = ["_test.go", ".*_templ\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  ignore_dangerous_root_dir = false
  include_dir = []
  include_file = []
  kill_delay = 500
  log = "build-errors.log"
  poll = true
  poll_interval = 500
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
