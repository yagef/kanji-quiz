services:
  api:
    image: kanji-quiz:latest
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8080:8080"
      - "40000:40000"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      # pgx-friendly connection string style
      DATABASE_URL: "postgres://postgres:PN5KPPQ4fHEAm7qiWg3n@db:5433/kanji?sslmode=disable"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PN5KPPQ4fHEAm7qiWg3n
      POSTGRES_DB: kanji
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
  go-mod-cache:
  go-build-cache:
